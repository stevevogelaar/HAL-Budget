<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HAL Budget - Intro Card</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px;
      height: 1080px;
      background: #0b0f19;
      color: #ffffff;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    .card {
      text-align: center;
      max-width: 1600px;
      padding: 0 60px;
    }
    .logo {
      width: calc(1920px / 5); /* 384px */
      height: auto;
      margin: 0 auto 56px auto;
      display: block;
    }
    .title {
      font-size: 128px;
      font-weight: 700;
      letter-spacing: -2px;
      line-height: 1.05;
      margin-bottom: 24px;
    }
    .tagline {
      font-size: 48px;
      font-weight: 400;
      color: #4ade80;
      margin-bottom: 72px;
      line-height: 1.2;
    }
    .description {
      font-size: 36px;
      font-weight: 400;
      color: #d1d5db;
      margin-bottom: 80px;
      line-height: 1.35;
    }
    .hackathon {
      font-size: 24px;
      font-weight: 500;
      color: #9ca3af;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="../Hal-Budget-Logo.png" alt="HAL Budget logo">
    <h1 class="title">HAL Budget</h1>
    <p class="tagline">Your money. Your machine. Your answers.</p>
    <p class="description">A privacy-first finance assistant running Gemma 4 on-device.</p>
    <p class="hackathon">GDG Windsor Build with AI Gemma Hackathon 2026</p>
  </div>
</body>
</html>
